<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الملفات المشتركة | Shared Files Library</title>
    <!-- خط Cairo الفاخر -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- مكتبة الأيقونات المتطورة -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة التأثيرات الحركية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #0a0b10, #1a1c29, #0f111a, #151824);
            --card-bg: rgba(18, 20, 32, 0.75);
            --text-main: #ffffff;
            --text-sub: #b2bec3;
            --card-item-bg: rgba(255, 255, 255, 0.02);
            --card-item-hover: rgba(255, 255, 255, 0.06);
            --border-color: rgba(255, 255, 255, 0.05);
            --search-bg: rgba(255, 255, 255, 0.03);
            
            --neon-purple: #6c5ce7;
            --neon-cyan: #00cec9;
            --neon-pink: #e84393;
            --base-font-size: 16px;
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(-45deg, #f5f6fa, #e6e9f0, #eef1f6, #f1f2f6);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #2d3436;
            --text-sub: #636e72;
            --card-item-bg: #ffffff;
            --card-item-hover: #f1f2f6;
            --border-color: rgba(0, 0, 0, 0.05);
            --search-bg: rgba(0, 0, 0, 0.02);
            --neon-purple: #5f27cd;
        }

        html {
            font-size: var(--base-font-size);
            transition: font-size 0.2s ease;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            padding: 40px 20px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease, color 0.5s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* شريط التحكم العلوي المطور */
        .accessibility-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        /* التبديل الانسيابي للشريط عند قلب اللغة للموقع */
        html[dir="ltr"] .accessibility-bar {
            left: auto;
            right: 20px;
        }

        .acc-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            height: 45px;
            padding: 0 15px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
        }

        .acc-btn:hover {
            transform: translateY(-2px);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }

        .main-container {
            width: 100%;
            max-width: 750px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15), 0 0 40px rgba(108, 92, 231, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            transition: background 0.5s ease, border 0.5s ease;
        }

        h1 {
            text-align: center;
            font-weight: 900;
            font-size: 2.6rem;
            margin: 0 0 10px 0;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-sub);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .file-counter {
            text-align: center;
            background: rgba(108, 92, 231, 0.1);
            border: 1px solid rgba(108, 92, 231, 0.2);
            padding: 6px 16px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto 30px auto;
            font-size: 0.9rem;
            color: var(--neon-cyan);
            font-weight: bold;
        }

        .search-box {
            position: relative;
            margin-bottom: 35px;
        }

        #search {
            width: 100%;
            padding: 18px 25px 18px 60px;
            background: var(--search-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            box-sizing: border-box;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.4s ease;
            font-family: 'Cairo', sans-serif;
        }

        html[dir="ltr"] #search {
            padding: 18px 60px 18px 25px;
        }

        #search:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 206, 201, 0.2);
        }

        .search-box i {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-cyan);
            font-size: 1.3rem;
        }

        html[dir="ltr"] .search-box i {
            left: auto;
            right: 25px;
        }

        #files-list {
            display: grid;
            gap: 20px;
        }

        .file-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-item-bg);
            padding: 22px 28px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
        }

        .file-card::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--neon-purple);
            transition: all 0.3s;
            border-radius: 0 20px 20px 0;
        }

        html[dir="ltr"] .file-card::before {
            right: auto;
            left: 0;
            border-radius: 20px 0 0 20px;
        }

        .file-card:hover {
            transform: translateX(-5px) translateY(-2px);
            background: var(--card-item-hover);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.1);
        }

        html[dir="ltr"] .file-card:hover {
            transform: translateX(5px) translateY(-2px);
        }

        .file-card:hover::before {
            width: 6px;
            background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-purple));
        }

        .file-details {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .file-icon-wrapper {
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pdf-icon { color: #ff7675; }
        .zip-icon { color: #ffeaa7; }
        .image-icon { color: #55efc4; }
        .video-icon { color: #74b9ff; }
        .app-icon { color: #a29bfe; }

        .file-title {
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--text-main);
        }

        .actions-wrapper {
            display: flex;
            gap: 10px;
        }

        .btn-download {
            background: linear-gradient(45deg, var(--neon-purple), #5f27cd);
            color: white;
            text-decoration: none;
            padding: 12px 22px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download:hover {
            background: linear-gradient(45deg, var(--neon-cyan), #00a8ff);
            color: #000;
        }

        .btn-copy {
            background: var(--search-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            box-sizing: border-box;
        }

        .btn-copy:hover {
            background: var(--neon-pink);
            border-color: var(--neon-pink);
            color: white;
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-pink);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(232, 67, 147, 0.4);
            z-index: 1000;
        }

        .footer-credits {
            margin-top: 30px;
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-sub);
            font-weight: 600;
        }

        .footer-credits span {
            color: var(--neon-pink);
            font-weight: bold;
        }

        .status-msg {
            text-align: center;
            padding: 40px;
            color: var(--text-sub);
            font-size: 1.2rem;
        }

        @media (max-width: 600px) {
            body { padding: 90px 10px 20px 10px; }
            .main-container { padding: 25px 20px; border-radius: 20px; }
            h1 { font-size: 2rem; }
            .file-card { flex-direction: column; align-items: stretch; gap: 20px; text-align: center; padding: 20px; }
            .file-details { flex-direction: column; gap: 10px; }
            .actions-wrapper { width: 100%; gap: 10px; }
            .btn-download { flex: 1; justify-content: center; }
            .btn-copy { width: 50px; height: 48px; }
        }
    </style>
</head>
<body>

<!-- شريط التحكم المتطور (لغات، ليلي، حجم خط) -->
<div class="accessibility-bar animate__animated animate__fadeIn">
    <!-- زر تبديل اللغة (عربي/إنجليزي) -->
    <button class="acc-btn" id="lang-toggle" title="Switch Language / تبديل اللغة">
        EN
    </button>
    <!-- زر التبديل الليلي/النهاري -->
    <button class="acc-btn" id="theme-toggle" title="تبديل الوضع الليلي/النهاري">
        <i class="fas fa-moon" id="theme-icon"></i>
    </button>
    <!-- أزرار الخط -->
    <button class="acc-btn" onclick="changeFontSize(1)" title="تكبير الخط">
        <i class="fas fa-font"></i><i class="fas fa-plus" style="font-size: 10px; margin-right: 2px;"></i>
    </button>
    <button class="acc-btn" onclick="changeFontSize(-1)" title="تصغير الخط">
        <i class="fas fa-font"></i><i class="fas fa-minus" style="font-size: 10px; margin-right: 2px;"></i>
    </button>
</div>

<div class="main-container animate__animated animate__fadeInUp">
    <h1 id="main-title">مكتبة الملفات المشتركة</h1>
    <p id="main-subtitle" class="subtitle">انقر للتحميل المباشر أو انسخ رابط الملف فوراً</p>
    
    <div id="counter" class="file-counter">جاري فحص المستندات...</div>

    <div class="search-box">
        <input type="text" id="search" placeholder="ابحث عن ملفك هنا...">
        <i class="fas fa-search"></i>
    </div>

    <div id="files-list"></div>
</div>

<div id="footer-text" class="footer-credits animate__animated animate__fadeIn animate__delay-1s">
    تم إنشاء هذا الموقع لـ <span>القروب الثلاثي</span> © 2026
</div>

<script>
    let filesCloud = [];
    let currentFontSize = 16;
    
    // قاموس نصوص الترجمة للغتين
    const translations = {
        ar: {
            title: "مكتبة الملفات المشتركة",
            subtitle: "انقر للتحميل المباشر أو انسخ رابط الملف فوراً",
            searchPlaceholder: "ابحث عن ملفك هنا...",
            counterText: "إجمالي الملفات المتوفرة: ",
            loading: "جاري استدعاء مصفوفة البيانات...",
            error: "فشل الاتصال بملف البيانات JSON. تأكد من وجوده!",
            noFiles: "لم نجد أي ملف بهذا الاسم!",
            download: "تحميل",
            toastSuccess: "تم نسخ رابط التحميل المباشر!",
            footer: "تم إنشاء هذا الموقع لـ <span>القروب الثلاثي</span> © 2026",
            langBtn: "EN"
        },
        en: {
            title: "Shared Files Library",
            subtitle: "Click for direct download or copy file link instantly",
            searchPlaceholder: "Search your file here...",
            counterText: "Total available files: ",
            loading: "Fetching files cloud data...",
            error: "Failed to connect to JSON data. Make sure it exists!",
            noFiles: "No files found with this name!",
            download: "Download",
            toastSuccess: "Direct download link copied successfully!",
            footer: "This website was created for <span>The Trio Group</span> © 2026",
            langBtn: "عربي"
        }
    };

    // تحديد اللغة الحالية (الافتراضية عربي)
    let currentLang = localStorage.getItem('lang') || 'ar';

    function applyLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        
        // تغيير اتجاه ولغة الـ HTML بالكامل
        const htmlTag = document.documentElement;
        htmlTag.setAttribute('lang', lang);
        htmlTag.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
        
        // تحديث النصوص الثابتة في الصفحة
        document.getElementById('main-title').innerText = translations[lang].title;
        document.getElementById('main-subtitle').innerText = translations[lang].subtitle;
        document.getElementById('search').placeholder = translations[lang].searchPlaceholder;
        document.getElementById('footer-text').innerHTML = translations[lang].footer;
        document.getElementById('lang-toggle').innerText = translations[lang].langBtn;
        
        // إعادة تحديث العداد والملفات باللغة الجديدة
        if (filesCloud.length > 0) {
            document.getElementById('counter').innerText = `${translations[lang].counterText}${filesCloud.length}`;
            renderFiles(filesCloud);
        } else {
            document.getElementById('counter').innerText = translations[lang].loading;
        }
    }

    // زر تبديل اللغة
    document.getElementById('lang-toggle').addEventListener('click', () => {
        const nextLang = currentLang === 'ar' ? 'en' : 'ar';
        applyLanguage(nextLang);
    });

    // دالة التحكم بحجم الخط
    function changeFontSize(action) {
        currentFontSize += action;
        if (currentFontSize < 13) currentFontSize = 13;
        if (currentFontSize > 24) currentFontSize = 24;
        document.documentElement.style.setProperty('--base-font-size', currentFontSize + 'px');
    }

    // إدارة الوضع الليلي/النهاري
    const themeToggleBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeIcon(savedTheme);

    themeToggleBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
    });

    function updateThemeIcon(theme) {
        themeIcon.className = theme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
    }

    function getFileStyles(url) {
        const urlLower = url.toLowerCase();
        if (urlLower.includes('.pdf')) return { icon: 'fas fa-file-pdf', style: 'pdf-icon' };
        if (urlLower.includes('.zip') || urlLower.includes('.rar')) return { icon: 'fas fa-file-archive', style: 'zip-icon' };
        if (urlLower.includes('.jpg') || urlLower.includes('.png') || urlLower.includes('.jpeg')) return { icon: 'fas fa-file-image', style: 'image-icon' };
        if (urlLower.includes('.mp4') || urlLower.includes('.mov') || urlLower.includes('.avi')) return { icon: 'fas fa-file-video', style: 'video-icon' };
        if (urlLower.includes('.exe') || urlLower.includes('.dmg') || urlLower.includes('.app')) return { icon: 'fas fa-laptop-code', style: 'app-icon' };
        return { icon: 'fas fa-file-alt', style: 'app-icon' };
    }

    async function startApp() {
        // تطبيق اللغة أولاً قبل جلب البيانات
        applyLanguage(currentLang);
        
        try {
            const res = await fetch('files.json');
            if (!res.ok) throw new Error();
            filesCloud = await res.json();
            document.getElementById('counter').innerText = `${translations[currentLang].counterText}${filesCloud.length}`;
            renderFiles(filesCloud);
        } catch (err) {
            document.getElementById('files-list').innerHTML = `
                <div class="status-msg" style="color: #ff7675;">
                    <i class="fas fa-radiation animate__animated animate__flash animate__infinite"></i>
                    ${translations[currentLang].error}
                </div>`;
        }
    }

    function renderFiles(items) {
        const container = document.getElementById('files-list');
        container.innerHTML = '';

        if (items.length === 0) {
            container.innerHTML = `<div class="status-msg"><i class="fas fa-ghost"></i> ${translations[currentLang].noFiles}</div>`;
            return;
        }

        items.forEach((item, index) => {
            let directLink = item.url.replace('?dl=0', '?dl=1');
            if (!directLink.includes('?dl=1') && !directLink.includes('&dl=1')) {
                directLink += directLink.includes('?') ? '&dl=1' : '?dl=1';
            }

            const visualData = getFileStyles(directLink);

            const card = document.createElement('div');
            card.className = `file-card animate__animated animate__fadeInUp`;
            card.style.animationDelay = `${index * 0.05}s`;

            card.innerHTML = `
                <div class="file-details">
                    <div class="file-icon-wrapper ${visualData.style}">
                        <i class="${visualData.icon}"></i>
                    </div>
                    <span class="file-title">${item.name}</span>
                </div>
                <div class="actions-wrapper">
                    <a href="${directLink}" class="btn-download" download>
                        <i class="fas fa-arrow-down"></i> ${translations[currentLang].download}
                    </a>
                    <button class="btn-copy" onclick="copyToClipboard('${directLink}')" title="Copy link">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function copyToClipboard(text) {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => showToast());
        } else {
            let textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                alert('Fails / فشل النسخ');
            }
            document.body.removeChild(textArea);
        }
    }

    function showToast() {
        const toast = document.createElement('div');
        toast.className = 'toast-notification animate__animated animate__bounceInUp';
        toast.innerHTML = `<i class="fas fa-check-circle"></i> ${translations[currentLang].toastSuccess}`;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.className = 'toast-notification animate__animated animate__bounceOutDown';
            setTimeout(() => toast.remove(), 500);
        }, 2500);
    }

    document.getElementById('search').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase().trim();
        const filtered = filesCloud.filter(f => f.name.toLowerCase().includes(val));
        renderFiles(filtered);
    });

    startApp();
</script>

</body>
</html>
